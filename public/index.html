<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 BOWO Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a25;
      --border: #2a2a3a;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header .status {
      display: flex;
      gap: 20px;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.off { background: var(--red); }

    /* Layout */
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px 30px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .full-width { grid-column: 1 / -1; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: var(--accent); }

    .card h2 {
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Agent Grid */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .agent-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      transition: all 0.2s;
      cursor: default;
    }

    .agent-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .agent-card .emoji { font-size: 2rem; margin-bottom: 8px; }
    .agent-card .name { font-size: 0.85rem; font-weight: 600; }
    .agent-card .role { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }

    /* Task Input */
    .task-input-area {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .task-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .task-input:focus { border-color: var(--accent); }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:hover { background: #818cf8; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--border); }

    /* Log */
    .log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid rgba(42, 42, 58, 0.5);
    }

    .log-entry .time { color: var(--text-dim); margin-right: 8px; }
    .log-entry .agent { color: var(--accent); font-weight: 600; }
    .log-entry .msg { color: var(--text); }

    /* Memory Table */
    .memory-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .memory-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--surface2);
      color: var(--accent);
      border-bottom: 1px solid var(--border);
    }

    .memory-table td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(42, 42, 58, 0.3);
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat {
      background: var(--surface2);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }

    .stat .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat .label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Result Panel */
    .result {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      max-height: 400px;
      overflow-y: auto;
      display: none;
    }

    .result.show { display: block; }

    .result h3 {
      color: var(--green);
      margin-bottom: 10px;
      font-size: 0.9rem;
    }

    .result .step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.8rem;
    }

    .result .step .icon { font-size: 1rem; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; padding: 10px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .header { flex-direction: column; gap: 10px; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🤖 BOWO Dashboard</h1>
    <div class="status">
      <span><span class="status-dot on" id="llmDot"></span>LLM: <span id="llmStatus">Loading...</span></span>
      <span><span class="status-dot on"></span>Agents: <span id="agentCount">0</span></span>
      <span>Memory: <span id="memoryCount">0</span></span>
    </div>
  </div>

  <div class="container">

    <!-- Stats -->
    <div class="card full-width">
      <div class="stats">
        <div class="stat">
          <div class="value" id="statAgents">0</div>
          <div class="label">AGENTS</div>
        </div>
        <div class="stat">
          <div class="value" id="statPipelines">0</div>
          <div class="label">PIPELINES</div>
        </div>
        <div class="stat">
          <div class="value" id="statMemory">0</div>
          <div class="label">MEMORY</div>
        </div>
        <div class="stat">
          <div class="value" id="statLLM">—</div>
          <div class="label">LLM MODEL</div>
        </div>
      </div>
    </div>

    <!-- Agents -->
    <div class="card">
      <h2>🤖 Agents</h2>
      <div class="agent-grid" id="agentGrid"></div>
    </div>

    <!-- Execute Task -->
    <div class="card">
      <h2>⚡ Execute Task</h2>
      <div class="task-input-area">
        <input type="text" class="task-input" id="taskInput" placeholder="e.g. Build a REST API for todo app..." />
        <button class="btn" id="executeBtn" onclick="executeTask()">▶ Run</button>
      </div>
      <div class="result" id="resultPanel">
        <h3 id="resultTitle"></h3>
        <div id="resultSteps"></div>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="card full-width">
      <h2>📜 Activity Log</h2>
      <div class="log" id="activityLog">
        <div class="log-entry">
          <span class="time">--:--</span>
          <span class="agent">system</span>
          <span class="msg">Dashboard initialized. Waiting for tasks...</span>
        </div>
      </div>
    </div>

    <!-- Memory -->
    <div class="card full-width">
      <h2>💾 Memory</h2>
      <table class="memory-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Type</th>
            <th>Agent</th>
            <th>Tags</th>
          </tr>
        </thead>
        <tbody id="memoryTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API = '';

    // ── Init ──
    async function init() {
      await loadStatus();
      await loadAgents();
      await loadMemory();
      setInterval(loadStatus, 10000);
    }

    // ── Load Status ──
    async function loadStatus() {
      try {
        const res = await fetch(`${API}/api/status`);
        const data = await res.json();

        document.getElementById('agentCount').textContent = data.agents.length;
        document.getElementById('memoryCount').textContent = data.memory.totalEntries;
        document.getElementById('statAgents').textContent = data.agents.length;
        document.getElementById('statPipelines').textContent = data.pipelines;
        document.getElementById('statMemory').textContent = data.memory.totalEntries;
        document.getElementById('statLLM').textContent = data.llm.model;
        document.getElementById('llmStatus').textContent = data.llm.available ? data.llm.model : 'Offline';

        const dot = document.getElementById('llmDot');
        dot.className = `status-dot ${data.llm.available ? 'on' : 'off'}`;
      } catch (e) {
        console.error('Status fetch failed:', e);
      }
    }

    // ── Load Agents ──
    async function loadAgents() {
      try {
        const res = await fetch(`${API}/api/agents`);
        const data = await res.json();

        const grid = document.getElementById('agentGrid');
        grid.innerHTML = data.agents.map(a => `
          <div class="agent-card">
            <div class="emoji">${a.emoji}</div>
            <div class="name">${a.name}</div>
            <div class="role">${a.enabled ? '🟢 Active' : '🔴 Inactive'}</div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Agents fetch failed:', e);
      }
    }

    // ── Load Memory ──
    async function loadMemory() {
      try {
        const res = await fetch(`${API}/api/memory/entries?limit=20`);
        const data = await res.json();

        const tbody = document.getElementById('memoryTable');
        tbody.innerHTML = data.entries.reverse().map(e => {
          const time = new Date(e.timestamp).toLocaleTimeString();
          return `<tr>
            <td>${time}</td>
            <td>${e.type}</td>
            <td>${e.agent}</td>
            <td>${e.tags.join(', ') || '—'}</td>
          </tr>`;
        }).join('');
      } catch (e) {
        console.error('Memory fetch failed:', e);
      }
    }

    // ── Execute Task ──
    async function executeTask() {
      const input = document.getElementById('taskInput');
      const btn = document.getElementById('executeBtn');
      const task = input.value.trim();

      if (!task) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Running...';
      addLog('orchestrator', `Processing: "${task}"`);

      const resultPanel = document.getElementById('resultPanel');
      resultPanel.classList.add('show');
      document.getElementById('resultTitle').textContent = '⏳ Running...';
      document.getElementById('resultSteps').innerHTML = '';

      try {
        const res = await fetch(`${API}/api/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task }),
        });

        const result = await res.json();

        document.getElementById('resultTitle').textContent =
          `✅ Completed in ${result.totalDuration}ms — ${result.totalArtifacts} artifacts`;

        document.getElementById('resultSteps').innerHTML = result.agentResults.map(ar => {
          const icon = ar.status === 'completed' ? '✅' : '❌';
          return `<div class="step"><span class="icon">${icon}</span><span>${ar.agent}</span><span style="color:var(--text-dim);margin-left:auto">${ar.duration}ms</span></div>`;
        }).join('');

        result.agentResults.forEach(ar => {
          addLog(ar.agent, `Status: ${ar.status} (${ar.duration}ms)`);
        });

        await loadMemory();
        await loadStatus();
      } catch (e) {
        document.getElementById('resultTitle').textContent = `❌ Error: ${e.message}`;
        addLog('system', `Error: ${e.message}`);
      }

      btn.disabled = false;
      btn.innerHTML = '▶ Run';
    }

    // ── Activity Log ──
    function addLog(agent, msg) {
      const log = document.getElementById('activityLog');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="time">${time}</span><span class="agent">${agent}</span><span class="msg">${msg}</span>`;
      log.prepend(entry);

      // Keep max 100 entries
      while (log.children.length > 100) log.removeChild(log.lastChild);
    }

    // ── Enter key ──
    document.getElementById('taskInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') executeTask();
    });

    // ── Start ──
    init();
  </script>
</body>
</html>
