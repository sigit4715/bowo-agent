# ═══════════════════════════════════════════════════════════════════════
# BOWO Agent — Docker Compose
# ═══════════════════════════════════════════════════════════════════════

services:
  # ── BOWO Agent ───────────────────────────────────────────────────────
  bowo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bowo-agent
    ports:
      - "3001:3001"
    volumes:
      - bowo-output:/app/output
      - bowo-config:/app/config
    env_file:
      - .env
    environment:
      - BOWO_PORT=3001
      - BOWO_LOG_LEVEL=info
      - HERMES_PATH=/usr/local/bin/hermes
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy
    networks:
      - bowo-net

  # ── Hermes (sidecar — uses host hermes binary) ──────────────────────
  hermes:
    image: node:22-alpine
    container_name: bowo-hermes
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Mount the host hermes binary and make it available
        apk add --no-cache bash curl
        echo "Hermes sidecar ready"
        # Keep container alive; the host hermes is accessed via volume
        while true; do sleep 3600; done
    volumes:
      - /usr/local/bin/hermes:/usr/local/bin/hermes:ro
      - hermes-config:/root/.hermes
    healthcheck:
      test: ["CMD", "test", "-x", "/usr/local/bin/hermes"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - bowo-net

volumes:
  bowo-output:
    driver: local
  bowo-config:
    driver: local
  hermes-config:
    driver: local

networks:
  bowo-net:
    driver: bridge
